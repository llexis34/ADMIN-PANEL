<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Users | LIMCOMA Admin</title>
    <link rel="shortcut icon" href="../images/limcoma logoo.png" type="image/x-icon" />
    <link rel="stylesheet" href="admin.css" />
</head>

<body>

    <!-- TOPBAR -->
    <div class="topbar">
        <div class="topbar-brand">
            <img src="../images/limcoma logoo.png" alt="Logo" /> LIMCOMA Admin Panel
        </div>
        <div class="topbar-right">
            <span id="adminName">Admin</span>
            <button class="btn-logout" onclick="adminLogout()">Logout</button>
        </div>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-section">Main</div>
        <a href="dashboard.html"><span class="ico">&#9632;</span> Dashboard</a>
        <a href="applications.html"><span class="ico">&#128196;</span> Applications</a>
        <a href="users.html" class="active"><span class="ico">&#128100;</span> Users</a>
        <div class="sidebar-section admin-only">Admin</div>
        <a href="subadmins.html" class="admin-only"><span class="ico">&#128272;</span> Admin Accounts</a>
        <div class="sidebar-section">Site</div>
        <a href="../index.html" target="_blank"><span class="ico">&#127760;</span> Main Site</a>
    </div>

    <!-- MAIN -->
    <div class="main">
        <div class="page-title">Registered Users</div>

        <div class="toolbar no-print">
            <input type="text" id="searchInput" placeholder="Search by name or email..." style="min-width:220px;" />
            <button class="btn btn-primary" onclick="loadUsers()">Search</button>
            <button class="btn btn-secondary" onclick="loadUsers()">Refresh</button>
        </div>

        <div id="alertBox"></div>

        <div class="card">
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>Status</th>
                            <th>Registered</th>
                            <th style="min-width:200px;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="userTbody">
                        <tr>
                            <td colspan="7" style="text-align:center;padding:20px;color:#888;">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- ── EDIT USER MODAL ────────────────────────────────────── -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-box" style="max-width:500px;">
            <div class="modal-header">
                <span>Edit User</span>
                <button class="modal-close" onclick="closeModal('editModal')">&#x2715;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editUserId" />
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="editFirst" class="form-control" />
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="editLast" class="form-control" />
                    </div>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="editEmail" class="form-control" />
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" id="editPhone" class="form-control" />
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('editModal')">Cancel</button>
                <button class="btn btn-primary" onclick="submitEdit()">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
  (function () {
    const role = sessionStorage.getItem("admin_role");
    if (role === "super_admin") {
      document.querySelectorAll(".admin-only").forEach(el => {
        el.classList.add("show-admin-only");
      });
    }
  })();
</script>

<script>
  function getAdminTabToken() {
    return sessionStorage.getItem("admin_tab_token") || "";
  }

  function clearAdminSessionStorage() {
    sessionStorage.removeItem("admin_role");
    sessionStorage.removeItem("admin_username");
    sessionStorage.removeItem("admin_tab_token");
  }

  function goToAdminLogin() {
    clearAdminSessionStorage();
    window.location.href = "login.html";
  }

  async function authFetch(url, options = {}) {
    const token = getAdminTabToken();
    if (!token) {
      goToAdminLogin();
      throw new Error("Missing admin tab token");
    }

    const headers = new Headers(options.headers || {});
    headers.set("X-Admin-Tab-Token", token);

    const response = await fetch(url, {
      ...options,
      credentials: "include",
      headers
    });

    if (response.status === 401) {
      goToAdminLogin();
      throw new Error("Admin session expired");
    }

    return response;
  }
</script>

<script>
        let _confirmResolve = null;

        function showConfirm({ type, title, message, label }) {
            const ICONS = {
                logout: { bg: '#E6F1FB', stroke: '#185FA5', svg: '<path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>' },
                delete: { bg: '#FCEBEB', stroke: '#A32D2D', svg: '<polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>' },
                disable: { bg: '#FAEEDA', stroke: '#854F0B', svg: '<circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>' },
                activate: { bg: '#EAF3DE', stroke: '#3B6D11', svg: '<path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>' },
            };
            const OK_STYLE = {
                logout: 'color:#185FA5',
                delete: 'color:#A32D2D',
                disable: 'color:#854F0B',
                activate: 'color:#3B6D11',
            };
            const OK_ANIM = {
                delete: 'shake',
                disable: 'flash-warn',
                activate: 'bounce-up',
                logout: 'spin-out',
            };
            return new Promise(resolve => {
                _confirmResolve = resolve;
                const ic = ICONS[type];
                const iconEl = document.getElementById('confirmIcon');
                iconEl.style.background = ic.bg;
                iconEl.innerHTML = '<svg width="26" height="26" fill="none" stroke="' + ic.stroke + '" stroke-width="2" viewBox="0 0 24 24">' + ic.svg + '</svg>';
                document.getElementById('confirmTitle').textContent = title;
                document.getElementById('confirmMsg').innerHTML = message;
                const ok = document.getElementById('confirmOk');
                ok.textContent = label;
                ok.style.cssText = OK_STYLE[type] || '';
                ok.dataset.animType = OK_ANIM[type] || 'shake';
                ok.onclick = () => {
                    const animClass = ok.dataset.animType;
                    ok.classList.remove('shake', 'flash-warn', 'bounce-up', 'spin-out');
                    void ok.offsetWidth;
                    ok.classList.add(animClass);
                    // Close immediately — animation plays as dialog fades out
                    closeConfirmAndResolve(true);
                };
                document.getElementById('confirmModal').classList.add('open');
            });
        }

        function closeConfirmAndResolve(val) {
            const overlay = document.getElementById('confirmModal');
            overlay.classList.add('closing');
            setTimeout(() => {
                overlay.classList.remove('open', 'closing');
                // Clean up any leftover animation classes
                const ok = document.getElementById('confirmOk');
                const cancel = document.getElementById('confirmCancel');
                if (ok) ok.classList.remove('shake', 'flash-warn', 'bounce-up', 'spin-out');
                if (cancel) cancel.classList.remove('clicked');
                if (_confirmResolve) { _confirmResolve(val); _confirmResolve = null; }
            }, 190);
        }

        function closeConfirm() {
            const cancelBtn = document.getElementById('confirmCancel');
            if (cancelBtn) {
                cancelBtn.classList.remove('clicked');
                void cancelBtn.offsetWidth;
                cancelBtn.classList.add('clicked');
            }
            // Close immediately — animation plays as dialog fades out
            closeConfirmAndResolve(false);
        }

        let currentRole = "";

        (async function init() {
            const me = await (await authFetch("api/admin_me.php", {
                credentials: "include"
            })).json();
            if (!me.ok) {
                window.location.href = "login.html";
                return;
            }

            currentRole = me.role;
            document.getElementById("adminName").textContent = me.username + " (" + me.role + ")";

            if (me.role === "super_admin") {
                document.querySelectorAll(".admin-only").forEach(el => {
                    el.classList.add("show-admin-only");
                });
            } else {
                document.querySelectorAll(".admin-only").forEach(el => el.remove());
            }

            loadUsers();
        })();

        async function loadUsers() {
            const search = document.getElementById("searchInput").value.trim();
            let url = "api/admin_users.php?action=list";
            if (search) url += "&search=" + encodeURIComponent(search);

            const r = await authFetch(url, {
                credentials: "include"
            });
            const data = await r.json();
            const tbody = document.getElementById("userTbody");

            if (!data.ok || !data.data.length) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:20px;color:#888;">No users found.</td></tr>';
                return;
            }

            tbody.innerHTML = data.data.map((u, index) => `
      <tr>
        <td>${index + 1}</td>
        <td>${esc(u.first_name || "")} ${esc(u.last_name || "")}</td>
        <td>${esc(u.email || "")}</td>
        <td>${esc(u.phone || "")}</td>
        <td><span class="badge ${u.is_active ? 'badge-active' : 'badge-inactive'}">${u.is_active ? 'Active' : 'Inactive'}</span></td>
        <td>${u.created_at ? u.created_at.slice(0, 10) : ""}</td>
        <td>
          <button class="btn btn-primary btn-sm" onclick="openEdit(${u.id},'${esc(u.first_name || "")}','${esc(u.last_name || "")}','${esc(u.email || "")}','${esc(u.phone || "")}')">Edit</button>
          <a href="applications.html" class="btn btn-info btn-sm">Applications</a>
          ${(currentRole === "admin" || currentRole === "super_admin") ? `
            <button class="btn btn-sm ${u.is_active ? 'btn-warning' : 'btn-success'}" onclick="toggleActive(${u.id}, ${u.is_active ? 0 : 1})">${u.is_active ? 'Disable' : 'Activate'}</button>
            <button class="btn btn-danger btn-sm" onclick="deleteUser(${u.id})">Delete</button>
          ` : ""}
        </td>
      </tr>
    `).join("");
        }

        function openEdit(id, first, last, email, phone) {
            document.getElementById("editUserId").value = id;
            document.getElementById("editFirst").value = first;
            document.getElementById("editLast").value = last;
            document.getElementById("editEmail").value = email;
            document.getElementById("editPhone").value = phone;
            openModal("editModal");
        }

        async function submitEdit() {
            const id = parseInt(document.getElementById("editUserId").value);
            const body = {
                id,
                first_name: document.getElementById("editFirst").value,
                last_name: document.getElementById("editLast").value,
                email: document.getElementById("editEmail").value,
                phone: document.getElementById("editPhone").value,
            };

            const r = await post("api/admin_users.php?action=edit", body);
            const data = await r.json();

            if (!data.ok) { showAlert("Error: " + (data.error || "Failed"), "danger"); return; }
            closeModal("editModal");
            showAlert("User updated successfully.", "success");
            loadUsers();
        }

        async function toggleActive(id, newState) {
            const type = newState ? 'activate' : 'disable';
            const ok = await showConfirm({ type, label: newState ? 'Activate' : 'Disable', title: newState ? 'Activate this account?' : 'Disable this account?', message: newState ? 'The user will regain access and be able to log in again.' : 'The user will not be able to log in while their account is disabled.' });
            if (!ok) return;
            const r = await post("api/admin_users.php?action=toggle_active", { id, is_active: newState });
            const data = await r.json();
            if (!data.ok) { showAlert("Error: " + (data.error || "Failed"), "danger"); return; }
            showAlert("User account " + (newState ? "activated" : "disabled") + ".", "success");
            loadUsers();
        }

        async function deleteUser(id) {
            const ok = await showConfirm({ type: 'delete', title: 'Delete this user?', message: 'This will permanently remove the user and all their applications. <strong>This cannot be undone.</strong>', label: 'Delete' });
            if (!ok) return;
            const r = await post("api/admin_users.php?action=delete", { id });
            const data = await r.json();
            if (!data.ok) { showAlert("Error: " + (data.error || "Failed"), "danger"); return; }
            showAlert("User deleted.", "success");
            loadUsers();
        }

        function openModal(id) { document.getElementById(id).classList.add("open"); }
        function closeModal(id) { document.getElementById(id).classList.remove("open"); }

        function post(url, body) {
            return authFetch(url, {
                method: "POST",
                credentials: "include",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body)
            });
        }

        function showAlert(msg, type) {
            const box = document.getElementById("alertBox");
            box.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
            setTimeout(() => box.innerHTML = "", 3500);
        }

        function esc(s) {
            return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
        }

        async function adminLogout() {
            const ok = await showConfirm({ type: 'logout', title: 'Sign out?', message: 'You will be returned to the login page.', label: 'Sign out' });
            if (!ok) return;
            await authFetch("api/admin_logout.php", { method: "POST" });
            clearAdminSessionStorage();
            window.location.href = "login.html";
        }

        document.getElementById("searchInput").addEventListener("keydown", e => {
            if (e.key === "Enter") loadUsers();
        });
    </script>

    <!-- CONFIRM MODAL -->
    <div class="overlay" id="confirmModal" onclick="if(event.target===this)closeConfirm()">
        <div class="modal"
            style="background:#fff;border-radius:14px;border:0.5px solid #e2e8f0;max-width:384px;width:100%;overflow:hidden;">
            <div style="padding:28px 24px 18px;text-align:center;">
                <div id="confirmIcon"
                    style="width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;">
                </div>
                <h3 id="confirmTitle" style="font-size:16px;font-weight:600;margin-bottom:7px;color:#111;"></h3>
                <p id="confirmMsg" style="font-size:13px;color:#555;line-height:1.6;margin:0;"></p>
            </div>
            <div style="height:0.5px;background:#eee;"></div>
            <div class="confirm-footer" style="display:grid;grid-template-columns:1fr 1fr;">
                <button id="confirmCancel" class="btn-cancel" onclick="closeConfirm()"
                    style="padding:14px;border:none;border-right:0.5px solid #eee;cursor:pointer;font-size:13.5px;font-weight:500;background:transparent;color:#444;font-family:inherit;">Cancel</button>
                <button id="confirmOk" class="btn-ok"
                    style="padding:14px;border:none;cursor:pointer;font-size:13.5px;font-weight:600;font-family:inherit;background:transparent;position:relative;overflow:hidden;"></button>
            </div>
        </div>
    </div>
</body>

</html>
