  <style>
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .detail-label {
      font-size: 0.78rem;
      color: #666;
      font-weight: bold;
      text-transform: uppercase;
    }

    .detail-value {
      font-size: 0.92rem;
      color: #222;
      margin-top: 2px;
    }

    .section-head {
      font-weight: bold;
      color: #15355a;
      font-size: 0.9rem;
      margin: 14px 0 8px;
      border-bottom: 1px solid #dce4ed;
      padding-bottom: 4px;
    }

    @media print {
      .modal-overlay {
        display: flex !important;
        position: static;
        background: none;
        padding: 0;
      }

      .modal-box {
        box-shadow: none;
        max-height: none;
      }

      .modal-header,
      .modal-footer,
      .topbar,
      .sidebar,
      .toolbar,
      .card:not(#printCard),
      .page-title {
        display: none !important;
      }

      .main {
        margin: 0;
        padding: 0;
      }

      #printCard {
        display: block !important;
      }
    }

    @media print {

      /* Hide everything except the view modal content */
      .topbar,
      .sidebar,
      .toolbar,
      .page-title,
      .card:not(#printTarget),
      #alertBox,
      .modal-footer,
      .modal-header,
      .modal-overlay:not(#viewModal) {
        display: none !important;
      }

      /* Make the view modal render like a normal page */
      .modal-overlay#viewModal {
        position: static !important;
        background: none !important;
        display: block !important;
        padding: 0 !important;
      }

      .modal-box {
        box-shadow: none !important;
        max-height: none !important;
        max-width: 100% !important;
        border-radius: 0 !important;
      }

      .main {
        margin: 0 !important;
        padding: 0 !important;
      }

      body {
        background: #fff !important;
      }

      /* Hide browser URL / header / footer */
      @page {
        margin: 12mm;
        size: A4;
      }
    }

    .export-dropdown-wrap {
      position: relative;
      display: inline-flex;
    }

    .export-dropdown-wrap .btn-success-main {
      border-radius: 4px 0 0 4px;
      background: #16a34a;
      color: #fff;
      border: none;
      padding: 6px 14px;
      font-size: 0.82rem;
      font-weight: bold;
      cursor: pointer;
    }

    .export-dropdown-wrap .btn-success-caret {
      border-radius: 0 4px 4px 0;
      background: #15803d;
      color: #fff;
      border: none;
      border-left: 1px solid #15803d;
      padding: 6px 10px;
      font-size: 0.78rem;
      cursor: pointer;
    }

    .export-dropdown-menu {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      right: 0;
      background: #fff;
      border: 1px solid #dce4ed;
      border-radius: 6px;
      min-width: 220px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
      overflow: hidden;
      z-index: 9999;
    }

    .export-dropdown-menu a,
    .export-dropdown-menu button {
      display: block;
      width: 100%;
      padding: 10px 16px;
      font-size: 0.85rem;
      color: #222;
      background: none;
      border: none;
      border-bottom: 1px solid #eee;
      text-align: left;
      cursor: pointer;
      text-decoration: none;
      font-family: Arial, sans-serif;
    }

    .export-dropdown-menu a:last-child,
    .export-dropdown-menu button:last-child {
      border-bottom: none;
    }

    .export-dropdown-menu a:hover,
    .export-dropdown-menu button:hover {
      background: #f5f8fc;
    }

    .export-dropdown-wrap.open .export-dropdown-menu {
      display: block;
    }
  </style>
</head>

<script>
  function getAdminTabToken() {
    return sessionStorage.getItem("admin_tab_token") || "";
  }

  function clearAdminSessionStorage() {
    sessionStorage.removeItem("admin_role");
    sessionStorage.removeItem("admin_username");
    sessionStorage.removeItem("admin_tab_token");
  }

  function goToAdminLogin() {
    clearAdminSessionStorage();
    window.location.href = "login.html";
  }

  async function authFetch(url, options = {}) {
    const token = getAdminTabToken();
    if (!token) {
      goToAdminLogin();
      throw new Error("Missing admin tab token");
    }

    const headers = new Headers(options.headers || {});
    headers.set("X-Admin-Tab-Token", token);

    const response = await fetch(url, {
      ...options,
      credentials: "include",
      headers
    });

    if (response.status === 401) {
      goToAdminLogin();
      throw new Error("Admin session expired");
    }

    return response;
  }
</script>

<script>
    let _confirmResolve = null;

    function showConfirm({ type, title, message, label }) {
      const ICONS = {
        logout: { bg: '#E6F1FB', stroke: '#185FA5', svg: '<path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>' },
        delete: { bg: '#FCEBEB', stroke: '#A32D2D', svg: '<polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>' },
        disable: { bg: '#FAEEDA', stroke: '#854F0B', svg: '<circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>' },
        activate: { bg: '#EAF3DE', stroke: '#3B6D11', svg: '<path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>' },
      };
      const OK_STYLE = {
        logout: 'color:#185FA5',
        delete: 'color:#A32D2D',
        disable: 'color:#854F0B',
        activate: 'color:#3B6D11',
      };
      const OK_ANIM = {
        delete: 'shake',
        disable: 'flash-warn',
        activate: 'bounce-up',
        logout: 'spin-out',
      };
      return new Promise(resolve => {
        _confirmResolve = resolve;
        const ic = ICONS[type];
        const iconEl = document.getElementById('confirmIcon');
        iconEl.style.background = ic.bg;
        iconEl.innerHTML = '<svg width="26" height="26" fill="none" stroke="' + ic.stroke + '" stroke-width="2" viewBox="0 0 24 24">' + ic.svg + '</svg>';
        document.getElementById('confirmTitle').textContent = title;
        document.getElementById('confirmMsg').innerHTML = message;
        const ok = document.getElementById('confirmOk');
        ok.textContent = label;
        ok.style.cssText = OK_STYLE[type] || '';
        ok.dataset.animType = OK_ANIM[type] || 'shake';
        ok.onclick = () => {
          const animClass = ok.dataset.animType;
          ok.classList.remove('shake', 'flash-warn', 'bounce-up', 'spin-out');
          void ok.offsetWidth;
          ok.classList.add(animClass);
          // Close immediately — animation plays as dialog fades out
          closeConfirmAndResolve(true);
        };
        document.getElementById('confirmModal').classList.add('open');
      });
    }

    function closeConfirmAndResolve(val) {
      const overlay = document.getElementById('confirmModal');
      overlay.classList.add('closing');
      setTimeout(() => {
        overlay.classList.remove('open', 'closing');
        // Clean up any leftover animation classes
        const ok = document.getElementById('confirmOk');
        const cancel = document.getElementById('confirmCancel');
        if (ok) ok.classList.remove('shake', 'flash-warn', 'bounce-up', 'spin-out');
        if (cancel) cancel.classList.remove('clicked');
        if (_confirmResolve) { _confirmResolve(val); _confirmResolve = null; }
      }, 190);
    }

    function closeConfirm() {
      const cancelBtn = document.getElementById('confirmCancel');
      if (cancelBtn) {
        cancelBtn.classList.remove('clicked');
        void cancelBtn.offsetWidth;
        cancelBtn.classList.add('clicked');
      }
      // Close immediately — animation plays as dialog fades out
      closeConfirmAndResolve(false);
    }

    let currentRole = "";
    let currentEditId = 0;
    let currentViewId = 0; // ← ADD THIS LINE

    (async function init() {
      const me = await (await authFetch("api/admin_me.php", {
        credentials: "include"
      })).json();
      if (!me.ok) {
        window.location.href = "login.html";
        return;
      }

      currentRole = me.role;
      document.getElementById("adminName").textContent = me.username + " (" + me.role + ")";

      if (me.role === "super_admin") {
        document.querySelectorAll(".admin-only").forEach(el => {
          el.classList.add("show-admin-only");
        });
      }

      // Check URL for ?view=ID
      const params = new URLSearchParams(location.search);
      const viewId = params.get("view");

      await loadApplications();

      if (viewId) openView(parseInt(viewId));
    })();

    async function loadApplications() {
      const search = document.getElementById("searchInput").value.trim();
      const status = document.getElementById("statusFilter").value;
      const exportBtn = document.getElementById("exportBtn");

      let url = "api/admin_applications.php?action=list";
      if (search) url += "&search=" + encodeURIComponent(search);
      if (status) url += "&status=" + encodeURIComponent(status);

      // Update export link only if button exists
      if (exportBtn) {
        exportBtn.href = "api/admin_export.php" + (status ? "?status=" + encodeURIComponent(status) : "");
      }

      const r = await authFetch(url, {
        credentials: "include"
      });
      const data = await r.json();

      const tbody = document.getElementById("appTbody");

      if (!data.ok || !data.data.length) {
        tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:20px;color:#888;">No applications found.</td></tr>`;
        return;
      }

      tbody.innerHTML = data.data.map((row, index) => `
     <tr>
        <td>${index + 1}</td>
        <td>${esc(row.first_name || "")} ${esc(row.last_name || "")}</td>
        <td>${esc(row.email || "")}</td>
        <td>${esc(row.phone || "")}</td>
        <td>${row.branch ? `<span style="font-size:0.82rem;font-weight:normal;color:#222;">${esc(row.branch)}</span>` : '<span style="color:#bbb;font-size:0.82rem;">—</span>'}</td>
        <td><span class="badge ${row.status ? 'badge-' + row.status.toLowerCase() : ''}">${row.status || '—'}</span></td>
        <td>${row.submitted_at ? row.submitted_at.slice(0, 10) : ""}</td>
        <td>
         <button class="btn btn-info btn-sm" onclick="openView(${row.id})">View</button>
         <button class="btn btn-warning btn-sm" onclick="openStatus(${row.id}, '${row.status}')">Status</button>
         <button class="btn btn-primary btn-sm" onclick="openEdit(${row.id})">Edit</button>
         ${(currentRole === "admin" || currentRole === "super_admin") ? `<button class="btn btn-danger btn-sm" onclick="deleteApp(${row.id})">Delete</button>` : ""}
        </td>
      </tr>
    `).join("");
    }

            r5: "Regular: ID Fee Proof"
          };
          let html = '<div class="section-head">Checklist Uploaded Files</div><div class="detail-grid">';
          keys.forEach(function (k) {
            const path = cl[k];
            const label = labels[k] || k;
            const ext = path.split('.').pop().toLowerCase();
            const isPdf = ext === 'pdf';
            html += '<div class="detail-item"><div class="detail-label">' + esc(label) + '</div><div class="detail-value">';
            if (isPdf) {
              html += '<a href="../' + esc(path) + '" target="_blank">📄 View PDF</a>';
            } else {
              html += '<a href="../' + esc(path) + '" target="_blank"><img src="../' + esc(path) + '" style="max-width:110px;max-height:80px;border:1px solid #ccc;display:block;" /></a>';
            }
            html += '</div></div>';
          });
          html += '</div>';
          return html;
        })()}
    `;

        "livelihood", "gross_monthly_income", "home_address", "mobile", "telephone",

        "spouse_name", "spouse_occupation", "spouse_company",

        "benef_name_4", "benef_relation_4", "benef_alloc_4", "benef_contact_4",

        "signature", "signature_file", "signature_date",
        "subscription_agreement_accepted", "kasunduan_accepted", "facebook_link"
      ];

      const body = { id: currentEditId };
      fields.forEach(f => {
        const el = document.getElementById("ef_" + f);
        if (el) body[f] = el.value;
      });

      // Branch is a dedicated DB column, not inside form_json — send separately
      const branchEl = document.getElementById("ef_branch");
      if (branchEl) body._branch = branchEl.value;


      const r = await post("api/admin_applications.php?action=edit", body);
      const data = await r.json();

      if (!data.ok) { showAlert("Error: " + (data.error || "Failed"), "danger"); return; }
      closeModal("editModal");
      showAlert("Application updated successfully.", "success");
      loadApplications();
    }

    // ── DELETE ──────────────────────────────────────────────
    async function deleteApp(id) {
      const ok = await showConfirm({ type: 'delete', title: 'Delete this application?', message: 'This will permanently remove the application. <strong>This cannot be undone.</strong>', label: 'Delete' });
      if (!ok) return;
      const r = await post("api/admin_applications.php?action=delete", { id });
      const data = await r.json();
      if (!data.ok) { showAlert("Error: " + (data.error || "Failed"), "danger"); return; }
      showAlert("Application deleted.", "success");
      loadApplications();
    }

    // ── HELPERS ─────────────────────────────────────────────
    function openModal(id) { document.getElementById(id).classList.add("open"); }
    function closeModal(id) { document.getElementById(id).classList.remove("open"); }

    function post(url, body) {
      return authFetch(url, {
        method: "POST",
        credentials: "include",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
    }

    function showAlert(msg, type) {
      const box = document.getElementById("alertBox");
      box.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
      setTimeout(() => box.innerHTML = "", 3500);
    }

    function esc(s) {
      return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    async function adminLogout() {
      const ok = await showConfirm({ type: 'logout', title: 'Sign out?', message: 'You will be returned to the login page.', label: 'Sign out' });
      if (!ok) return;
      await authFetch("api/admin_logout.php", { method: "POST", credentials: "include" });
      sessionStorage.removeItem("admin_role");
      sessionStorage.removeItem("admin_username");
      window.location.href = "login.html";
    }

    // Allow pressing Enter in search
    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("searchInput").addEventListener("keydown", e => {
        if (e.key === "Enter") loadApplications();
      });
      document.getElementById("statusFilter").addEventListener("change", loadApplications);
    });

    function exportSubscriptionPDF(id) {
      window.open(
        "api/admin_export_subscription_pdf.php?id=" + id,

    }

    function exportKasunduanPDF(id) {
      window.open(

    function toggleExportMenu() {
      document.getElementById('exportDropWrap').classList.toggle('open');

    function closeExportMenu() {
      document.getElementById('exportDropWrap').classList.remove('open');
    }
    document.addEventListener('click', function (e) {
      const wrap = document.getElementById('exportDropWrap');
      if (wrap && !wrap.contains(e.target)) closeExportMenu();
